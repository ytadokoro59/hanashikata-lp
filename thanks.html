<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ↓ GTM は <head> の最上部（この直後）に設置予定 -->
  <meta name="robots" content="noindex, nofollow" />
  <title>無料体験のお申し込みありがとうございます｜話し方教室アナグラム</title>
  <meta name="description" content="話し方教室アナグラムの無料体験お申し込み完了ページです。" />
  <link rel="canonical" href="https://hanashikata-anagram.com/thanks.html" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- ===========================================================
       ▼ コンバージョン計測タグ設置場所 ▼
       このページはフォーム送信完了後の到達ページ（サンクスページ）です。
       Google 広告のコンバージョンタグ／GA4 のイベントタグを、
       下記コメントの位置（または </body> 直前）に貼り付けてください。

       例：Google タグ（gtag.js）を利用する場合は <head> 内に基本タグ、
       コンバージョン計測スニペットをこのページの読み込み時に発火させます。
  =========================================================== -->
  <!-- GA4 / Google Ads conversion tag here -->

  <style>
    :root { --teal:#5db8c8; --teal-d:#3a9aae; --accent:#2a5a6e; --cta:#e07630; --cta-h:#c8621e; --text:#333; --text-l:#666; --border:#dde8ec; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Noto Sans JP',sans-serif; color:var(--text); line-height:1.9;
      background:#f7fbfd; -webkit-font-smoothing:antialiased;
      min-height:100vh; display:flex; flex-direction:column;
    }
    .thanks-header { background:#fff; border-bottom:1px solid var(--border); padding:16px 20px; }
    .thanks-header a { color:var(--teal-d); font-size:13px; font-weight:700; text-decoration:none; }
    .thanks-main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 20px; }
    .thanks-card {
      width:100%; max-width:600px; background:#fff; border-radius:16px;
      border:1px solid var(--border); box-shadow:0 6px 30px rgba(0,0,0,0.06);
      padding:48px 28px; text-align:center;
    }
    .thanks-check {
      width:72px; height:72px; margin:0 auto 24px; border-radius:50%;
      background:var(--teal); display:flex; align-items:center; justify-content:center;
      box-shadow:0 6px 20px rgba(93,184,200,0.35);
    }
    .thanks-check svg { width:38px; height:38px; stroke:#fff; stroke-width:3; fill:none; }
    h1 { font-size:22px; color:var(--accent); margin-bottom:16px; line-height:1.5; }
    .thanks-lead { font-size:15px; color:var(--text); margin-bottom:10px; }
    .thanks-note {
      font-size:13px; color:var(--text-l); background:var(--teal); background:rgba(93,184,200,0.10);
      border-radius:10px; padding:12px 16px; margin:22px 0 28px; line-height:1.8;
    }
    .thanks-back {
      display:inline-block; background:var(--cta); color:#fff; font-weight:700; font-size:15px;
      text-decoration:none; padding:15px 40px; border-radius:50px;
      box-shadow:0 4px 16px rgba(224,118,48,0.35); transition:0.25s ease;
    }
    .thanks-back:hover { background:var(--cta-h); transform:translateY(-2px); }
    @media (max-width:480px){ .thanks-card { padding:40px 20px; } h1 { font-size:20px; } }
  </style>
</head>
<body>
  <!-- GTM (noscript) は <body> 開始直後（この位置）に設置予定 -->
  <header class="thanks-header">
    <a href="index.html">&larr; トップページへ戻る</a>
  </header>

  <main class="thanks-main">
    <div class="thanks-card">
      <div class="thanks-check" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="4,12 10,18 20,6"/></svg>
      </div>
      <h1>無料体験のお申し込み<br>ありがとうございます</h1>
      <p class="thanks-lead">内容を確認のうえ、担当者よりご連絡いたします。</p>
      <p class="thanks-note">通常1〜2営業日以内にご連絡いたします。<br>今しばらくお待ちください。</p>
      <a class="thanks-back" href="index.html">トップページへ戻る</a>
    </div>
  </main>

  <!-- GA4 / Google Ads conversion tag (alternative placement before </body>) -->
</body>
</html>
